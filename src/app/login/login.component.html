<div style="max-width:360px;margin:80px auto;padding:24px;border:1px solid #ddd;border-radius:8px;">
  <h2>DeskLine — Sign in</h2>
  <form (ngSubmit)="submit()">
    <div style="margin-bottom:12px;">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" required style="width:100%;padding:8px;" />
    </div>
    <div style="margin-bottom:12px;">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" required style="width:100%;padding:8px;" />
    </div>
    <p *ngIf="error" style="color:red;">{{ error }}</p>
    <button type="submit" style="width:100%;padding:10px;">Sign in</button>
  </form>
</div>
